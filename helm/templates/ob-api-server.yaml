apiVersion: apps/v1
kind: Deployment
metadata:
  name: ob-api-server
  namespace: {{ .Values.global.namespace }}
  labels:
    app: ob-api-server
    app.kubernetes.io/part-of: qantara
spec:
  replicas: {{ .Values.apiServer.replicas }}
  selector:
    matchLabels:
      app: ob-api-server
  template:
    metadata:
      labels:
        app: ob-api-server
        app.kubernetes.io/part-of: qantara
    spec:
      containers:
        - name: ob-api-server
          image: {{ .Values.global.registry }}/{{ .Values.apiServer.image }}:{{ .Values.global.imageTag }}
          ports:
            - containerPort: {{ .Values.apiServer.port }}
              protocol: TCP
          env:
            - name: SERVICE_PORT
              value: "{{ .Values.apiServer.port }}"
            - name: ADAPTER_MODE
              value: {{ .Values.apiServer.env.ADAPTER_MODE | quote }}
            - name: CONSENT_SERVICE_URL
              value: {{ .Values.apiServer.env.CONSENT_SERVICE_URL | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.apiServer.env.LOG_LEVEL | quote }}
          resources:
            {{- toYaml .Values.apiServer.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.apiServer.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.apiServer.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ob-api-server
  namespace: {{ .Values.global.namespace }}
  labels:
    app: ob-api-server
spec:
  selector:
    app: ob-api-server
  ports:
    - port: 8000
      targetPort: {{ .Values.apiServer.port }}
      protocol: TCP
