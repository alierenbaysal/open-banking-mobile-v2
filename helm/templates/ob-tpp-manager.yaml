apiVersion: apps/v1
kind: Deployment
metadata:
  name: ob-tpp-manager
  namespace: {{ .Values.global.namespace }}
  labels:
    app: ob-tpp-manager
    app.kubernetes.io/part-of: qantara
spec:
  replicas: {{ .Values.tppManager.replicas }}
  selector:
    matchLabels:
      app: ob-tpp-manager
  template:
    metadata:
      annotations:
        # Wait for the Envoy sidecar's outbound to be ready before starting the
        # app, so the startup Keycloak bootstrap (BFF client + roles) doesn't hit
        # connection-refused during the sidecar race.
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
      labels:
        app: ob-tpp-manager
        app.kubernetes.io/part-of: qantara
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: ob-tpp-manager
          image: {{ .Values.global.registry }}/{{ .Values.tppManager.image }}:{{ .Values.tppManager.tag | default .Values.global.imageTag }}
          ports:
            - containerPort: {{ .Values.tppManager.port }}
              protocol: TCP
          env:
            - name: PORT
              value: "{{ .Values.tppManager.port }}"
            - name: KEYCLOAK_URL
              value: {{ .Values.tppManager.env.KEYCLOAK_URL | quote }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.tppManager.env.KEYCLOAK_REALM | quote }}
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: qantara-keycloak-admin
                  key: client_id
            - name: KEYCLOAK_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: qantara-keycloak-admin
                  key: client_secret
            - name: CONSENT_SERVICE_URL
              value: {{ .Values.tppManager.env.CONSENT_SERVICE_URL | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.tppManager.env.LOG_LEVEL | quote }}
            - name: BFF_CLIENT_ID
              value: {{ .Values.tppManager.env.BFF_CLIENT_ID | quote }}
            - name: PORTAL_BASE_URL
              value: {{ .Values.tppManager.env.PORTAL_BASE_URL | quote }}
            # Microsoft Entra (Azure AD) SSO — human login via OIDC. Admins are
            # recognised by ADMIN_EMAILS / ADMIN_DOMAIN; everyone else is a partner.
            - name: ADMIN_DOMAIN
              value: {{ .Values.tppManager.env.ADMIN_DOMAIN | quote }}
            - name: ADMIN_EMAILS
              value: {{ .Values.tppManager.env.ADMIN_EMAILS | quote }}
            - name: SMTP_HOST
              value: {{ .Values.tppManager.env.SMTP_HOST | quote }}
            - name: SMTP_PORT
              value: {{ .Values.tppManager.env.SMTP_PORT | quote }}
            - name: SMTP_FROM
              value: {{ .Values.tppManager.env.SMTP_FROM | quote }}
            - name: SMTP_FROM_NAME
              value: {{ .Values.tppManager.env.SMTP_FROM_NAME | quote }}
            - name: SMTP_IMPLICIT_TLS
              value: {{ .Values.tppManager.env.SMTP_IMPLICIT_TLS | quote }}
            - name: SMTP_INSECURE
              value: {{ .Values.tppManager.env.SMTP_INSECURE | quote }}
            # Secrets (synced from Vault via ExternalSecret qantara-portal-secrets).
            # optional:true so the pod still starts before the Vault entry is seeded.
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: qantara-portal-secrets
                  key: smtp_username
                  optional: true
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qantara-portal-secrets
                  key: smtp_password
                  optional: true
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: qantara-portal-secrets
                  key: session_secret
                  optional: true
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qantara-portal-secrets
                  key: admin_api_key
                  optional: true
            - name: RECONCILER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qantara-portal-secrets
                  key: reconciler_api_key
                  optional: true
            # Entra SSO (OIDC confidential client) + Graph app (svc-entra-automation,
            # B2B guest invites). optional:true so the pod still starts before the
            # Vault entry is seeded.
            - name: ENTRA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: qantara-portal-secrets
                  key: entra_client_id
                  optional: true
            - name: ENTRA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: qantara-portal-secrets
                  key: entra_client_secret
                  optional: true
            - name: ENTRA_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: qantara-portal-secrets
                  key: entra_tenant_id
                  optional: true
            - name: GRAPH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: qantara-portal-secrets
                  key: graph_client_id
                  optional: true
            - name: GRAPH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: qantara-portal-secrets
                  key: graph_client_secret
                  optional: true
          resources:
            {{- toYaml .Values.tppManager.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /portal-api/health
              port: {{ .Values.tppManager.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /portal-api/health
              port: {{ .Values.tppManager.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ob-tpp-manager
  namespace: {{ .Values.global.namespace }}
  labels:
    app: ob-tpp-manager
spec:
  selector:
    app: ob-tpp-manager
  ports:
    - port: 8000
      targetPort: {{ .Values.tppManager.port }}
      protocol: TCP
