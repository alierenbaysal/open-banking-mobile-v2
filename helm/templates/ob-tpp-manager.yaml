apiVersion: apps/v1
kind: Deployment
metadata:
  name: ob-tpp-manager
  namespace: {{ .Values.global.namespace }}
  labels:
    app: ob-tpp-manager
    app.kubernetes.io/part-of: qantara
spec:
  replicas: {{ .Values.tppManager.replicas }}
  selector:
    matchLabels:
      app: ob-tpp-manager
  template:
    metadata:
      labels:
        app: ob-tpp-manager
        app.kubernetes.io/part-of: qantara
    spec:
      containers:
        - name: ob-tpp-manager
          image: {{ .Values.global.registry }}/{{ .Values.tppManager.image }}:{{ .Values.global.imageTag }}
          ports:
            - containerPort: {{ .Values.tppManager.port }}
              protocol: TCP
          env:
            - name: PORT
              value: "{{ .Values.tppManager.port }}"
            - name: KEYCLOAK_URL
              value: {{ .Values.tppManager.env.KEYCLOAK_URL | quote }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.tppManager.env.KEYCLOAK_REALM | quote }}
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: qantara-keycloak-admin
                  key: client_id
            - name: KEYCLOAK_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: qantara-keycloak-admin
                  key: client_secret
            - name: CONSENT_SERVICE_URL
              value: {{ .Values.tppManager.env.CONSENT_SERVICE_URL | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.tppManager.env.LOG_LEVEL | quote }}
          resources:
            {{- toYaml .Values.tppManager.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /portal-api/health
              port: {{ .Values.tppManager.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /portal-api/health
              port: {{ .Values.tppManager.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ob-tpp-manager
  namespace: {{ .Values.global.namespace }}
  labels:
    app: ob-tpp-manager
spec:
  selector:
    app: ob-tpp-manager
  ports:
    - port: 8000
      targetPort: {{ .Values.tppManager.port }}
      protocol: TCP
