apiVersion: apps/v1
kind: Deployment
metadata:
  name: ob-consent-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: ob-consent-service
    app.kubernetes.io/part-of: qantara
spec:
  replicas: {{ .Values.consentService.replicas }}
  selector:
    matchLabels:
      app: ob-consent-service
  template:
    metadata:
      labels:
        app: ob-consent-service
        app.kubernetes.io/part-of: qantara
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: ob-consent-service
          image: {{ .Values.global.registry }}/{{ .Values.consentService.image }}:{{ .Values.global.imageTag }}
          ports:
            - containerPort: {{ .Values.consentService.port }}
              protocol: TCP
          env:
            - name: SERVICE_PORT
              value: "{{ .Values.consentService.port }}"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: qantara-db-credentials
                  key: uri
            - name: LOG_LEVEL
              value: {{ .Values.consentService.env.LOG_LEVEL | quote }}
            - name: CONSENT_DEFAULT_EXPIRY_DAYS
              value: {{ .Values.consentService.env.CONSENT_DEFAULT_EXPIRY_DAYS | quote }}
            - name: CONSENT_CLEANUP_INTERVAL
              value: {{ .Values.consentService.env.CONSENT_CLEANUP_INTERVAL | quote }}
          resources:
            {{- toYaml .Values.consentService.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.consentService.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.consentService.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ob-consent-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: ob-consent-service
spec:
  selector:
    app: ob-consent-service
  ports:
    - port: 8000
      targetPort: {{ .Values.consentService.port }}
      protocol: TCP
