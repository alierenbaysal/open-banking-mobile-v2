# Secrets backing the partner self-service BFF (ob-tpp-manager):
#   session_secret     — HMAC key for the portal session + activation-ticket cookies
#   admin_api_key      — bootstrap key for POST /portal-api/auth/invite (X-Admin-Key)
#   reconciler_api_key — shared key the DMZ gateway-config CronJob presents (X-Internal-Key)
#   smtp_username      — Stalwart submission account for qantara@bankdhofar.dev
#   smtp_password      — Stalwart submission password
#
# Seed the Vault entry `qantara-portal-secrets` (cluster-secret-store) out-of-band:
#   session_secret / admin_api_key / reconciler_api_key:
#       openssl rand -base64 30 | tr -d '/+=' | head -c24
#   smtp_username = qantara@bankdhofar.dev ; smtp_password = <Stalwart mailbox password>
# The Stalwart mailbox qantara@bankdhofar.dev must exist (admin-provisioned), the
# same way manara@bankdhofar.dev does.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qantara-portal-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/part-of: qantara
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: cluster-secret-store
  target:
    name: qantara-portal-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: qantara-portal-secrets
