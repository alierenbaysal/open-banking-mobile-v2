global:
  domain: qantara.tnd.bankdhofar.com
  namespace: ob-tnd
  registry: registry.bankdhofar.com/ea/open-banking
  imageTag: latest

apiServer:
  replicas: 2
  image: ob-api-server
  port: 8000
  env:
    ADAPTER_MODE: "mock"
    CONSENT_SERVICE_URL: "http://ob-consent-service:8000"
    LOG_LEVEL: "INFO"
    JWT_VALIDATION_ENABLED: "true"
    KEYCLOAK_ISSUER_URL: "http://keycloak.uat.bankdhofar.com/realms/open-banking"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

consentService:
  replicas: 2
  image: ob-consent-service
  port: 8000
  env:
    LOG_LEVEL: "INFO"
    CONSENT_DEFAULT_EXPIRY_DAYS: "180"
    CONSENT_CLEANUP_INTERVAL: "3600"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

tppManager:
  replicas: 2
  image: ob-tpp-manager
  # Latest CI-built tag (pipeline 43859, commit 16512c9 — BFF user-update fix).
  # Pinned per-service because portal/tpp-manager build from different commits.
  tag: "895b6052"
  port: 8000
  env:
    KEYCLOAK_URL: "http://keycloak.keycloak.svc.cluster.local:8080"
    KEYCLOAK_REALM: "open-banking"
    CONSENT_SERVICE_URL: "http://ob-consent-service:8000"
    LOG_LEVEL: "info"
    BFF_CLIENT_ID: "qantara-portal-bff"
    PORTAL_BASE_URL: "https://qantara.omtd.bankdhofar.com"
    # Entra SSO: admins are bank staff (ADMIN_DOMAIN) or explicitly listed emails.
    # Everyone else who signs in via Entra is a partner (tpp-developer).
    ADMIN_DOMAIN: "bankdhofar.com"
    ADMIN_EMAILS: "e.baysal@bankdhofar.com"
    # Stalwart submission relay. Use the SAME host GitLab uses
    # (mx.cp.bankdhofar.com → 10.150.99.54, the stalwart-stalwart-mail-0 LB that
    # exposes 587/submission). The public mx.bankdhofar.dev LB (84.8.47.14) only
    # serves port 25, so submitting on 587 there returns EOF. Envelope/From stays
    # qantara@bankdhofar.dev (SPF/DKIM/DMARC live on that domain).
    SMTP_HOST: "mx.cp.bankdhofar.com"
    SMTP_PORT: "587"
    SMTP_FROM: "qantara@bankdhofar.dev"
    SMTP_FROM_NAME: "Qantara Open Banking"
    SMTP_IMPLICIT_TLS: "false"
    SMTP_INSECURE: "true"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

eventService:
  replicas: 1
  image: ob-event-service
  port: 8000
  env:
    WEBHOOK_MAX_RETRIES: "5"
    WEBHOOK_TIMEOUT: "10"
    LOG_LEVEL: "INFO"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

theqaService:
  replicas: 1
  image: ob-theqa-service
  port: 8000
  env:
    LOG_LEVEL: "INFO"
    SAML_SP_ENTITY_ID: "36f54cb6-f700-46b0-81d3-5caa4ad322f0"
    SAML_SP_BASE_URL: "https://qantara-api.omtd.bankdhofar.com"
    SAML_IDP_ENTITY_ID: "https://SASIdp"
    SAML_IDP_SSO_URL: "https://stg-idp-pki.mtcit.gov.om/Idp/SingleSignOnService"
    SAML_IDP_SLO_URL: "https://stg-idp-pki.mtcit.gov.om/Idp/SingleLogoutService"
    APP_RETURN_DEEPLINK: "bdonline://verify/callback"
  # Istio egress to the MTCIT THEQA SAS hosts over the IPsec tunnel.
  egress:
    enabled: true
    idpAddresses:
      - "10.31.10.22"
      - "10.31.10.33"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

portal:
  replicas: 1
  image: ob-portal
  # Latest CI-built tag (pipeline 43855, commit d86ef74 — self-service portal UI).
  tag: "fb8d2248"
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

postgresql:
  enabled: true
  instances: 2
  storage: 10Gi
  database: qantara
  owner: qantara

redis:
  enabled: true
  storage: 1Gi
