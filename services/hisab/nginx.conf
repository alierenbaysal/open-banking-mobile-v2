server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # OAuth2 token — TPP authenticates via ob-tpp-manager → Keycloak
    location = /api/token {
        proxy_pass http://ob-tpp-manager:8000/portal-api/tpp/hisab-business/sandbox-token;
        proxy_method POST;
        proxy_set_header Host $host;
        proxy_set_header Content-Type "application/json";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # OBIE AISP endpoints (account information)
    location /open-banking/v4.0/aisp/ {
        proxy_pass http://ob-api-server:8000/open-banking/v4.0/aisp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # Auth-code exchange — consent-scoped token after customer approval
    location /api/auth-codes/ {
        rewrite ^/api/auth-codes/(.*)$ /banking/auth-codes/$1 break;
        proxy_pass http://ob-consent-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # Hisab user auth (email/password)
    location /api/auth/ {
        rewrite ^/api/auth/(.*)$ /banking/masroofi/$1 break;
        proxy_pass http://ob-consent-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # Consent API (legacy compat — used by consent redirect flow)
    location = /api/consent {
        proxy_pass http://ob-consent-service:8000/consents;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location /api/consent/ {
        rewrite ^/api/consent/(.*)$ /consents/$1 break;
        proxy_pass http://ob-consent-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # Legacy OBIE proxy (backward compat)
    location /api/obie/ {
        proxy_pass http://ob-api-server:8000/open-banking/v4.0/aisp/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
