stages:
  - mirror
  - build
  - scan        # Phase 5 (#11) — Trivy HIGH/CRITICAL fixable-vuln gate per OB image
  - sign        # Phase 5 (#11) — cosign key-based sign + self-verify of pushed digest

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: 1

mirror-to-github:
  stage: mirror
  image: alpine/git:latest
  allow_failure: true
  variables:
    GIT_DEPTH: 0
  script:
    - git remote add github "https://${GITHUB_TOKEN}@github.com/alierenbaysal/open-banking-mobile-v2.git" || true
    - git remote set-url github "https://${GITHUB_TOKEN}@github.com/alierenbaysal/open-banking-mobile-v2.git"
    - git push github HEAD:main --force
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - services/masroofi-mobile/**/*
        - services/hisab-mobile/**/*
        - services/bd-online-mobile/**/*
        - services/sadad-mobile/**/*
        - services/salalah-mobile/**/*
        - services/ob-sandbox-app/**/*
        - .github/workflows/**/*

.build_template: &build_template
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]

build-ob-api-server:
  <<: *build_template
  script:
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}/services/ob-api-server"
      --dockerfile "${CI_PROJECT_DIR}/services/ob-api-server/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}/ob-api-server:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}/ob-api-server:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - services/ob-api-server/**/*

